# PostgreSQL Configuration für Production
# Diese Datei optimiert PostgreSQL für kleinere bis mittlere Workloads

# Memory Settings
shared_buffers = 128MB                    # 25% des verfügbaren RAMs
effective_cache_size = 512MB              # Geschätzter verfügbarer Cache
work_mem = 8MB                           # Memory pro Sort/Hash Operation
maintenance_work_mem = 64MB              # Memory für Maintenance Operations

# WAL Settings (Write-Ahead Logging)
wal_buffers = 4MB
wal_level = replica                      # Für Replikation/Backup
max_wal_size = 1GB
min_wal_size = 80MB

# Checkpoint Settings
checkpoint_completion_target = 0.9
checkpoint_timeout = 15min

# Connection Settings
max_connections = 100
listen_addresses = '*'

# Performance Settings
random_page_cost = 1.1                  # Für SSD Storage
effective_io_concurrency = 200          # Für SSD Storage

# Logging Settings
logging_collector = on
log_destination = 'stderr'
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_statement = 'none'                  # Keine Statements loggen (Performance)
log_duration = off
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '

# Security Settings
ssl = off                               # SSL in Production aktivieren
password_encryption = scram-sha-256

# Autovacuum Settings
autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 1min
